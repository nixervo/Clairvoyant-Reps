name: Clan Snapshot

on:
  schedule:
    - cron: "01 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install openpyxl

      - run: python clan_snapshot.py --once

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "clan snapshot update"
          commit_user_name: "clan-snapshot-bot"
          commit_user_email: "bot@clan-snapshot.local"
          file_pattern: "clan_2527.xlsx"

# Clan reputation snapshot - runs hourly, daily dump at 13:00 GMT+8
name: Clan Snapshot

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install openpyxl

      - run: python clan_snapshot.py --once

      - run: |
          git config user.name "clan-snapshot-bot"
          git config user.email "bot@clan-snapshot.local"
          git add clan_2527.xlsx index.html *.html _hourly_cache.json
          git diff --quiet && git diff --staged --quiet || git commit -m "clan snapshot update"
          git push

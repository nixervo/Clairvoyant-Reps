name: Clan Snapshot
on: [workflow_dispatch]
permissions:
  contents: write
  actions: write
jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: nixervo/clan-snapshot-action@beta
        with:
          clan-id: 2527
          accent-color: '#e94560'
          accent-light: '#ff6b8a'
